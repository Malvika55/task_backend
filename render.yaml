# Optional: deploy API to Render (free tier) for a live demo with GitHub Pages UI.
# 1. Connect https://github.com/Malvika55/task_backend on Render
# 2. Apply this Blueprint
# 3. Set GitHub repo variable API_URL = https://YOUR-SERVICE.onrender.com/api/v1
# 4. Re-run the Pages deploy workflow

databases:
  - name: task-db
    plan: free
    databaseName: task_platform
    user: task_platform

services:
  - type: web
    name: task-backend-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace @p5/api && npm run prisma:generate --workspace @p5/api && cd apps/api && npx prisma db push --accept-data-loss
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: https://malvika55.github.io,http://localhost:5173
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: admin@taskplatform.dev
      - key: ADMIN_PASSWORD
        value: Admin@12345!
